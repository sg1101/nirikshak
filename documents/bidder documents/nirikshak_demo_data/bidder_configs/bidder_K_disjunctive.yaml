# Bidder K — the DISJUNCTIVE EXPERIENCE rule scenario (PRD §7, the wow factor)
# Evaluated against an additional EXP-002 criterion (CPWD-style):
#   "Three similar completed works each ≥40% of estimated cost; OR two at ≥60%; OR one at ≥80%"
# For a ₹50 cr tender: Branch A threshold = ₹20 cr, Branch B = ₹30 cr, Branch C = ₹40 cr
#
# Bidder K's portfolio — designed so all three branches are evaluable:
#   Claim 1: ₹22.5 cr — similar — passes Branch A only
#   Claim 2: ₹18.0 cr — similar — drops out (below 40%)
#   Claim 3: ₹35.0 cr — similar — passes A & B
#   Claim 4: ₹42.0 cr — similar — passes A, B, C
#   Claim 5: ₹28.0 cr — borderline-similar (routed to Needs Review on similarity)
#
# Branch A (≥3 at ≥40%): {1, 3, 4} = 3 → PASS
# Branch B (≥2 at ≥60%): {3, 4}    = 2 → PASS
# Branch C (≥1 at ≥80%): {4}       = 1 → PASS
# Verdict: ELIGIBLE (any branch passes)

